name = "kbrelay-api"
main = "src/index.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
preview_urls = false

[observability]
enabled = true
head_sampling_rate = 1.0

# ──────────────────────────────────────────────────────────────
# Two explicit environments: `prod` and `dev`. Every deploy /
# `d1 migrations apply` / `secret put` MUST pass `--env prod|dev`.
# A bare `wrangler deploy` is intentionally not viable (top-level
# config has no bindings/routes).
#
# Local dev: `wrangler dev --env dev` runs Miniflare with a LOCAL D1
# (the dev d1 binding is NOT marked remote), so the local loop needs
# no remote resources beyond the DB having been created once.
# ──────────────────────────────────────────────────────────────

# ── prod ──────────────────────────────────────────────────────
[env.prod]
name = "kbrelay-api"
workers_dev = false
preview_urls = false

[env.prod.vars]
ALLOWED_ORIGINS = "https://kbrelay.com,https://www.kbrelay.com,https://kbrelay.lalalimited.com"
PUBLIC_BASE_URL = "https://kbrelay.com"
# Billing (v0.23.0, KBR-135). Enabled iff the SQUARE_ACCESS_TOKEN secret is set
# (wrangler secret put --env prod). App/location ids are public by design —
# the Web Payments SDK needs them in the browser (served by /billing/config).
SQUARE_ENVIRONMENT = "production"
SQUARE_LOCATION_ID = "LGWZ8DTP4WB7E"
SQUARE_APP_ID = "sq0idp-cnXvoTwMMkQ3_GXCuUUMOA"

# Daily billing sweep (renewals, dunning, trial expiry) — 06:17 UTC.
[env.prod.triggers]
crons = ["17 6 * * *"]

[[env.prod.routes]]
pattern = "kbrelay.com/api/*"
zone_name = "kbrelay.com"

# Scalar docs (KBR-109). Wildcard (not exact `/docs`) is deliberate: a Pages
# custom domain shadows a *non-wildcard* Worker route, so an exact `/docs` route
# lost to the SPA in prod. The `/api/*` route wins precisely because it's a
# wildcard — mirror that. The router only handles exact `/docs`; `/docs/<x>`
# 404s from the Worker, which is fine (no such page exists).
[[env.prod.routes]]
pattern = "kbrelay.com/docs*"
zone_name = "kbrelay.com"

# Legacy domain (pre-KBR-134). Kept so existing agent tokens / MCP configs
# pointed at kbrelay.lalalimited.com keep working during the migration window;
# drop these routes when the old domain is formally deprecated.
[[env.prod.routes]]
pattern = "kbrelay.lalalimited.com/api/*"
zone_name = "lalalimited.com"

[[env.prod.routes]]
pattern = "kbrelay.lalalimited.com/docs*"
zone_name = "lalalimited.com"

[[env.prod.d1_databases]]
binding = "DB"
database_name = "kbrelay"
database_id = "d64d1ce5-7803-4fc8-96ba-8122d2d9e700"
migrations_dir = "migrations"

# Attachments object storage (v0.16.0). Bucket already provisioned.
[[env.prod.r2_buckets]]
binding = "BLOB"
bucket_name = "kbrelay-attachments"

# ── dev ───────────────────────────────────────────────────────
# Provision once before the first dev deploy:
#   wrangler d1 create kbrelay-dev     → paste id below
#   wrangler pages project create kbrelay-dev --production-branch main
[env.dev]
name = "kbrelay-api-dev"
workers_dev = false
preview_urls = false

[env.dev.vars]
ALLOWED_ORIGINS = "https://dev.kbrelay.lalalimited.com,http://localhost:5173"
PUBLIC_BASE_URL = "https://dev.kbrelay.lalalimited.com"

[[env.dev.routes]]
pattern = "dev.kbrelay.lalalimited.com/api/*"
zone_name = "lalalimited.com"

# Scalar docs (KBR-109) — mirror of the prod `/docs*` route (see prod note).
[[env.dev.routes]]
pattern = "dev.kbrelay.lalalimited.com/docs*"
zone_name = "lalalimited.com"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "kbrelay-dev"
database_id = "34ba981f-0655-4067-b649-131e827ca94c"
migrations_dir = "migrations"

# Attachments object storage (v0.16.0). Local `wrangler dev` simulates R2;
# the dev bucket backs remote dev deploys.
[[env.dev.r2_buckets]]
binding = "BLOB"
bucket_name = "kbrelay-attachments-dev"
